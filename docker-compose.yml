services:
  ai-service:
    build:
      context: ./ai-service
      args:
        EMBEDDING_MODEL: intfloat/e5-base-v2
    container_name: xploretn_ai
    restart: unless-stopped
    env_file: ./ai-service/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build: ./backend
    container_name: xploretn_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "5000:5000"
    depends_on:
      ai-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: xploretn_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
